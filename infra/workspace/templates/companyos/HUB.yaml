hub:
  version: "2.0"
  id: "{{HUB_ID}}"
  name: "{{USERNAME}}'s Company OS"
  owner: "{{USERNAME}}"
  template: "companyos"
  template_version: "1.3.0"
  created: "2026-02-19T00:00:00Z"

# What this workspace is for
description: "AI company operating system — org chart, goal alignment, agent delegation, budget tracking, and governance in one place."

subdomain: "{{SUBDOMAIN}}"

intelligence:
  global: "opt-in"
  org: null

# Pre-configured agent roles — the executive team
agents:
  - id: "ceo"
    name: "CEO Agent"
    role: "Chief Executive Officer"
    model: "anthropic/claude-sonnet-4-6"
    scope: "Company vision, strategy, external comms"
    status: "pending"
  - id: "cto"
    name: "CTO Agent"
    role: "Chief Technology Officer"
    model: "anthropic/claude-sonnet-4-6"
    scope: "Technical architecture, engineering decisions, code quality"
    status: "pending"
  - id: "cmo"
    name: "CMO Agent"
    role: "Chief Marketing Officer"
    model: "anthropic/claude-sonnet-4-6"
    scope: "Content, growth, brand, social media"
    status: "pending"
  - id: "coo"
    name: "COO Agent"
    role: "Chief Operating Officer"
    model: "anthropic/claude-haiku-4-5"
    scope: "Operations, task tracking, process optimization"
    status: "pending"

memory:
  hub_id: "{{HUB_ID}}"
  retention_days: 365

context:
  reserved_files:
    - AGENTS.md
    - SOUL.md
    - USER.md
    - MEMORY.md
    - HEARTBEAT.md
    - WELCOME.md
  memory_dir: "./memory"
  learnings_dir: "./learnings"
  knowledge_dir: "./knowledge"
  skills_dir: "./skills"

# Agent configuration
agent:
  model: "anthropic/claude-sonnet-4-6"
  heartbeat: "30m"
  channels:
    - telegram
  thinking: false
  proactive: true

models:
  default: "anthropic/claude-sonnet-4-6"
  routing:
    orchestrator: "anthropic/claude-sonnet-4-6"
    researcher: "anthropic/claude-sonnet-4-6"
    automation: "anthropic/claude-haiku-4-5"
  free_tier:
    - "anthropic/claude-haiku-4-5"

vault:
  id: ""

# Pre-configured integrations — user connects these during onboarding
integrations:
  - id: telegram
    status: pending
    description: "Primary communication channel"
  - id: github
    status: pending
    description: "Code repositories and engineering oversight"
  - id: gmail
    status: pending
    description: "Company email (draft only)"
  - id: notion
    status: pending
    description: "Company wiki and project docs"
  - id: linear
    status: pending
    description: "Engineering task tracking"

# Skills pre-installed in this workspace
skills:
  registry: "hubify"
  installed:
    - morning-brief
    - meeting-notes
    - quick-capture
    - web-research
    - email-draft
    - company-briefing
    - github
    - gog
    - things-mac
    - apple-reminders

# Deployed squads — populated when user deploys a squad pack via web UI
squads: []

# Knowledge subscriptions — platform hubs this workspace receives insights from
subscriptions: []

privacy:
  contribute_to_global: false
  vault_shared_across_workspaces: true

mode: "guided"
