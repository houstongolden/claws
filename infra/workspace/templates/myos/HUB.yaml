hub:
  version: "2.0"
  id: "{{HUB_ID}}"
  name: "{{USERNAME}}'s Workspace"
  owner: "{{USERNAME}}"
  template: "myos"
  template_version: "1.3.0"
  created: "2026-02-19T00:00:00Z"

# What this workspace is for
description: "Personal AI operating system for founders and builders — fitness, projects, inbox, and content in one place."

subdomain: "{{SUBDOMAIN}}"

intelligence:
  global: "opt-in"
  org: null

agents: []

memory:
  hub_id: "{{HUB_ID}}"
  retention_days: 365

context:
  reserved_files:
    - AGENTS.md
    - SOUL.md
    - USER.md
    - MEMORY.md
    - HEARTBEAT.md
    - WELCOME.md
  memory_dir: "./memory"
  learnings_dir: "./learnings"
  knowledge_dir: "./knowledge"
  skills_dir: "./skills"

# Agent configuration
agent:
  model: "anthropic/claude-sonnet-4-6"
  heartbeat: "30m"
  channels:
    - telegram
  thinking: false
  proactive: true

models:
  default: "anthropic/claude-sonnet-4-6"
  routing:
    orchestrator: "anthropic/claude-sonnet-4-6"
    researcher: "anthropic/claude-sonnet-4-6"
    automation: "anthropic/claude-haiku-4-5"
  free_tier:
    - "anthropic/claude-haiku-4-5"

vault:
  id: ""

# Pre-configured integrations — user connects these during onboarding
integrations:
  - id: telegram
    status: pending
    description: "Primary communication channel"
  - id: github
    status: pending
    description: "Code repositories and project tracking"
  - id: strava
    status: pending
    description: "Fitness tracking and accountability"
  - id: gmail
    status: pending
    description: "Email inbox management (draft only)"

# Skills pre-installed in this workspace
skills:
  registry: "hubify"
  installed:
    - morning-brief
    - meeting-notes
    - quick-capture
    - web-research
    - email-draft
    - strava
    - github
    - weather
    - gog
    - apple-reminders
    - things-mac

# Deployed squads — populated when user deploys a squad pack via web UI
# Squad crons (standups, work orchestration, reviews) run in Convex, not locally.
# This section is synced from Convex on boot for agent awareness.
squads: []

# Knowledge subscriptions — platform hubs this workspace receives insights from
# Managed via web UI (Labs > Connect Your Workspace) or CLI (hubify subscribe)
subscriptions: []

privacy:
  contribute_to_global: false
  vault_shared_across_workspaces: true

mode: "guided"
