hub:
  version: "2.0"
  id: "{{HUB_ID}}"
  name: "{{USERNAME}}'s Founder OS"
  owner: "{{USERNAME}}"
  template: "founder-os"
  template_version: "1.3.0"
  created: "2026-02-20T00:00:00Z"

# What this workspace is for
description: "Founder AI OS — sales pipeline, content, LinkedIn, and GTM in one place."

subdomain: "{{SUBDOMAIN}}"

intelligence:
  global: "opt-in"
  org: null

agents: []

memory:
  hub_id: "{{HUB_ID}}"
  retention_days: 365

context:
  reserved_files:
    - AGENTS.md
    - SOUL.md
    - USER.md
    - MEMORY.md
    - HEARTBEAT.md
    - WELCOME.md
  memory_dir: "./memory"
  learnings_dir: "./learnings"
  knowledge_dir: "./knowledge"
  skills_dir: "./skills"

# Agent configuration
agent:
  model: "anthropic/claude-sonnet-4-6"
  heartbeat: "30m"
  channels:
    - telegram
  thinking: false
  proactive: true

models:
  default: "anthropic/claude-sonnet-4-6"
  routing:
    orchestrator: "anthropic/claude-sonnet-4-6"
    strategist: "anthropic/claude-opus-4-5"
    content: "anthropic/claude-sonnet-4-6"
    automation: "anthropic/claude-haiku-4-5"
  free_tier:
    - "anthropic/claude-haiku-4-5"

vault:
  id: ""

# Pre-configured integrations — user connects these during onboarding
integrations:
  - id: telegram
    status: pending
    description: "Primary communication and alerts"
  - id: linkedin
    status: pending
    description: "Engagement monitoring and content — draft only"
  - id: twitter
    status: pending
    description: "Mentions and brand monitoring — draft only"
  - id: gmail
    status: pending
    description: "Email drafts for outreach — never sends without approval"

# Skills pre-installed in this workspace
skills:
  registry: "hubify"
  installed:
    - morning-brief
    - meeting-notes
    - quick-capture
    - web-research
    - email-draft
    - github
    - gog
    - apple-reminders

# Deployed squads — populated when user deploys a squad pack via web UI
squads: []

# Knowledge subscriptions — platform hubs this workspace receives insights from
subscriptions: []

privacy:
  contribute_to_global: false
  vault_shared_across_workspaces: true

mode: "guided"

# Founder OS specific settings
founderos:
  focus: "go-to-market"
  linkedin_monitoring: true
  twitter_monitoring: true
  sales_pipeline: true
  content_calendar: true
  draft_only: true  # All external comms are drafts — human approves before send
