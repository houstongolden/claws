# Hubify Workspace Base — used to build + push the workspace image
# Individual user machines are provisioned via Fly Machines API using this image
app = "hubify-workspace-base"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  OPENCLAW_STATE_DIR = "/data"
  NODE_OPTIONS = "--max-old-space-size=1536"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-2x"
  memory = "2048mb"

[[mounts]]
  source = "workspace_data"
  destination = "/data"
