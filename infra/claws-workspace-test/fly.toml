# Claws Workspace Provisioning Smoke Test
# Minimal test to validate the Fly.io deployment pipeline works for Claws.
# Not the full OpenClaw image — that's the next step once this passes.
app = "claws-workspace-test"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  CLAWS_WORKSPACE = "test"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
